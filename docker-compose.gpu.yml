# =============================================================================
# GPU overrides — merge on top of docker-compose.yml for GPU production
#
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up
# =============================================================================

services:

  vllm:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  cosyvoice:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  voicebot:
    # The main bot also uses CUDA for Parakeet TDT STT + Silero VAD
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
