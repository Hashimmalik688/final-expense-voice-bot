<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sarah — Final Expense Voice Bot</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* Design Tokens */
:root {
  --bg:          #090e1a;
  --surface:     #101624;
  --surface-2:   #151d2e;
  --surface-3:   #1c2640;
  --border:      #1e2d45;
  --border-light:#253352;
  --accent:       #3b82f6;
  --accent-hover: #2563eb;
  --accent-dim:   rgba(59,130,246,0.12);
  --accent-glow:  rgba(59,130,246,0.25);
  --green:        #10b981;
  --green-dim:    rgba(16,185,129,0.12);
  --yellow:       #f59e0b;
  --yellow-dim:   rgba(245,158,11,0.12);
  --danger:       #ef4444;
  --danger-hover: #dc2626;
  --danger-dim:   rgba(239,68,68,0.12);
  --text:         #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted:   #5d6f88;
  --t-fast:   150ms ease-out;
  --t-base:   220ms ease-out;
  --t-slow:   300ms ease-out;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.5;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
.app-shell { display: grid; grid-template-rows: auto 1fr; min-height: 100vh; }

/* Top Bar */
.topbar {
  position: sticky; top: 0; z-index: 40;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex; align-items: center; justify-content: space-between;
  backdrop-filter: blur(8px);
}
.topbar-brand { display: flex; align-items: center; gap: 12px; }
.brand-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--accent), #7c3aed);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.brand-icon svg { width: 16px; height: 16px; color: #fff; }
.brand-name { font-weight: 600; font-size: 0.95rem; letter-spacing: -0.01em; }
.brand-name span { font-weight: 400; color: var(--text-secondary); margin-left: 6px; font-size: 0.82rem; }
.topbar-nav { display: flex; align-items: center; gap: 16px; }
.service-pills { display: flex; gap: 6px; }
.pill {
  display: flex; align-items: center; gap: 5px;
  background: var(--surface-2); border: 1px solid var(--border);
  border-radius: 9999px; padding: 3px 12px;
  font-size: 0.72rem; font-weight: 500; color: var(--text-secondary);
  transition: border-color var(--t-fast), background var(--t-fast);
}
.pill .dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted);
  flex-shrink: 0; transition: background var(--t-base), box-shadow var(--t-base);
}
.pill.green  { border-color: rgba(16,185,129,0.3); background: var(--green-dim); color: var(--green); }
.pill.green  .dot { background: var(--green); box-shadow: 0 0 6px var(--green); }
.pill.yellow { border-color: rgba(245,158,11,0.3); background: var(--yellow-dim); color: var(--yellow); }
.pill.yellow .dot { background: var(--yellow); }
.pill.red    { border-color: rgba(239,68,68,0.25); color: var(--danger); }
.pill.red    .dot { background: var(--danger); }
.topbar-link {
  font-size: 0.8rem; color: var(--accent); text-decoration: none;
  display: flex; align-items: center; gap: 4px;
  padding: 8px 12px; border: 1px solid transparent; border-radius: 6px;
  font-weight: 500; transition: background var(--t-fast), border-color var(--t-fast); cursor: pointer;
}
.topbar-link:hover { background: var(--accent-dim); border-color: rgba(59,130,246,0.3); }
.topbar-link svg { width: 13px; height: 13px; }

/* Main Grid */
.main-grid {
  width: 100%; max-width: 1060px; margin: 0 auto;
  padding: 32px 20px;
  display: grid; grid-template-columns: 340px 1fr;
  gap: 20px; align-items: start;
}
@media (max-width: 768px) { .main-grid { grid-template-columns: 1fr; padding: 20px 16px; } }

/* Card */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
.card-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
}
.card-header-icon {
  width: 28px; height: 28px; border-radius: 6px; background: var(--surface-3);
  display: flex; align-items: center; justify-content: center; color: var(--text-secondary); flex-shrink: 0;
}
.card-header-icon svg { width: 14px; height: 14px; }
.card-title { font-size: 0.82rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-secondary); }

/* Call Panel */
.call-panel { display: flex; flex-direction: column; }
.call-center {
  padding: 32px 20px;
  display: flex; flex-direction: column; align-items: center; gap: 20px;
  border-bottom: 1px solid var(--border);
}

/* Avatar */
.avatar-ring { position: relative; width: 96px; height: 96px; flex-shrink: 0; }
.avatar-ring::before {
  content: ''; position: absolute; inset: -3px; border-radius: 50%;
  background: conic-gradient(var(--accent) 0%, transparent 60%);
  opacity: 0; transition: opacity var(--t-slow);
}
.avatar-ring.active::before { opacity: 1; animation: spin-ring 3s linear infinite; }
@keyframes spin-ring { to { transform: rotate(360deg); } }
.avatar-inner {
  position: relative; width: 100%; height: 100%; border-radius: 50%;
  background: linear-gradient(135deg, #1d4ed8 0%, #6d28d9 100%);
  display: flex; align-items: center; justify-content: center;
  border: 3px solid var(--surface); overflow: hidden; z-index: 1;
}
.avatar-inner svg { width: 42px; height: 42px; color: rgba(255,255,255,0.9); }
.avatar-pulse {
  position: absolute; inset: -12px; border-radius: 50%;
  border: 2px solid var(--accent); opacity: 0; transform: scale(0.85);
}
.avatar-ring.active .avatar-pulse { animation: pulse-ring 1.6s ease-out infinite; }
@keyframes pulse-ring {
  0%   { opacity: 0.8; transform: scale(0.85); }
  100% { opacity: 0;   transform: scale(1.15); }
}

/* Status */
.call-status { text-align: center; }
.call-status-text { font-size: 0.92rem; font-weight: 500; color: var(--text-secondary); min-height: 1.4em; transition: color var(--t-base); }
.call-status-text.connected { color: var(--green); }
.call-status-text.error     { color: var(--danger); }
.call-status-sub { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

/* Meters */
.meters { width: 100%; display: flex; flex-direction: column; gap: 8px; }
.meter-row { display: flex; align-items: center; gap: 12px; }
.meter-label { font-size: 0.72rem; color: var(--text-muted); width: 38px; flex-shrink: 0; font-weight: 500; }
.meter-track { flex: 1; height: 4px; background: var(--surface-3); border-radius: 2px; overflow: hidden; }
.meter-fill { height: 100%; border-radius: 2px; width: 0%; transition: width 80ms linear; }
.meter-fill.local  { background: linear-gradient(90deg, var(--accent), #60a5fa); }
.meter-fill.remote { background: linear-gradient(90deg, var(--green), #34d399); }

/* Actions */
.call-actions {
  width: 100%; display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 20px;
}
.btn-call {
  min-width: 180px; min-height: 48px; padding: 0 32px; border: none; border-radius: 9999px;
  cursor: pointer; font-family: inherit; font-size: 0.92rem; font-weight: 600; letter-spacing: 0.01em;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  transition: background var(--t-fast), transform var(--t-fast), box-shadow var(--t-fast);
}
.btn-call:active { transform: scale(0.96); }
.btn-call:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn-call.idle {
  background: var(--accent); color: #fff; box-shadow: 0 0 24px var(--accent-glow);
}
.btn-call.idle:hover:not(:disabled) { background: var(--accent-hover); box-shadow: 0 0 32px var(--accent-glow); }
.btn-call.active { background: var(--danger); color: #fff; box-shadow: 0 0 20px rgba(239,68,68,0.2); }
.btn-call.active:hover:not(:disabled) { background: var(--danger-hover); }
.btn-call svg { width: 16px; height: 16px; flex-shrink: 0; }

/* Voice Selector */
.voice-control { display: flex; align-items: center; gap: 8px; width: 100%; }
.voice-label {
  display: flex; align-items: center; gap: 5px;
  font-size: 0.74rem; color: var(--text-muted); font-weight: 500; flex-shrink: 0; white-space: nowrap;
}
.voice-label svg { width: 13px; height: 13px; }
.voice-select {
  flex: 1; background: var(--surface-2); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); padding: 6px 10px;
  font-size: 0.78rem; font-family: inherit; cursor: pointer; outline: none;
  transition: border-color var(--t-fast);
}
.voice-select:hover { border-color: var(--border-light); }
.voice-select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }

/* Transcript */
.transcript-panel { display: flex; flex-direction: column; height: 540px; }
.transcript-feed {
  flex: 1; overflow-y: auto; padding: 16px 20px;
  display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth;
}
.transcript-feed::-webkit-scrollbar { width: 4px; }
.transcript-feed::-webkit-scrollbar-track { background: transparent; }
.transcript-feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.msg-row { display: flex; flex-direction: column; gap: 2px; max-width: 88%; }
.msg-row.you    { align-self: flex-end; align-items: flex-end; }
.msg-row.sarah  { align-self: flex-start; align-items: flex-start; }
.msg-row.system { align-self: center; align-items: center; max-width: 100%; }
.msg-sender { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); padding: 0 8px; }
.msg-bubble { padding: 10px 14px; border-radius: 10px; font-size: 0.875rem; line-height: 1.55; word-break: break-word; }
.msg-row.you   .msg-bubble { background: var(--accent-dim); border: 1px solid rgba(59,130,246,0.2); color: #93c5fd; border-bottom-right-radius: 4px; }
.msg-row.sarah .msg-bubble { background: var(--green-dim); border: 1px solid rgba(16,185,129,0.2); color: #6ee7b7; border-bottom-left-radius: 4px; }
.msg-row.system .msg-bubble { background: var(--surface-2); border: 1px solid var(--border); color: var(--text-muted); font-size: 0.75rem; font-style: italic; border-radius: 9999px; padding: 4px 14px; }
.text-input-row { padding: 12px 20px; border-top: 1px solid var(--border); }
.text-input {
  width: 100%; background: var(--surface-2); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); padding: 12px 16px;
  font-size: 0.875rem; font-family: inherit; outline: none;
  transition: border-color var(--t-fast), box-shadow var(--t-fast);
}
.text-input::placeholder { color: var(--text-muted); }
.text-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }

/* Debug */
.debug-panel { margin-top: 20px; grid-column: 1 / -1; }
.debug-summary {
  font-size: 0.74rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--text-muted); cursor: pointer; user-select: none;
  padding: 12px 20px; display: flex; align-items: center; gap: 8px; list-style: none;
}
.debug-summary svg { width: 12px; height: 12px; transition: transform var(--t-fast); }
details[open] .debug-summary svg { transform: rotate(90deg); }
.debug-body { padding: 0 20px 16px; }
.log-pre {
  background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px;
  padding: 14px; font-family: 'Cascadia Code','Fira Code','Consolas',monospace;
  font-size: 0.7rem; color: var(--text-secondary); height: 130px;
  overflow-y: auto; white-space: pre-wrap; word-break: break-all; line-height: 1.6;
}
.log-pre::-webkit-scrollbar { width: 4px; }
.log-pre::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
</style>
</head>
<body>
<div class="app-shell">

<header class="topbar">
  <div class="topbar-brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>
    </div>
    <span class="brand-name">Sarah <span>Final Expense Voice Bot</span></span>
  </div>
  <div class="topbar-nav">
    <div class="service-pills">
      <div class="pill" id="pill-lk"><span class="dot"></span>LiveKit</div>
      <div class="pill" id="pill-vllm"><span class="dot"></span>vLLM</div>
      <div class="pill" id="pill-tts"><span class="dot"></span>TTS</div>
    </div>
    <a class="topbar-link" href="/admin">
      Admin
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </a>
  </div>
</header>

<main>
<div class="main-grid">

  <div class="card call-panel">
    <div class="card-header">
      <div class="card-header-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.28 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.6a16 16 0 0 0 6 6l.94-.94a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 21.66 16l.26.92z"/></svg>
      </div>
      <span class="card-title">Live Call</span>
    </div>
    <div class="call-center">
      <div class="avatar-ring" id="avatar-ring">
        <div class="avatar-pulse"></div>
        <div class="avatar-inner">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
      </div>
      <div class="call-status">
        <div class="call-status-text" id="status">Ready — click Call Sarah to begin</div>
        <div class="call-status-sub" id="status-sub"></div>
      </div>
      <div class="meters">
        <div class="meter-row">
          <span class="meter-label">You</span>
          <div class="meter-track"><div class="meter-fill local" id="meter-local"></div></div>
        </div>
        <div class="meter-row">
          <span class="meter-label">Sarah</span>
          <div class="meter-track"><div class="meter-fill remote" id="meter-remote"></div></div>
        </div>
      </div>
    </div>
    <div class="call-actions">
      <button class="btn-call idle" id="btn-call">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.28 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.6a16 16 0 0 0 6 6l.94-.94a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 21.66 16l.26.92z"/></svg>
        Call Sarah
      </button>
      <div class="voice-control">
        <label class="voice-label" for="voice-select">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
          Voice
        </label>
        <select class="voice-select" id="voice-select" aria-label="Sarah voice"></select>
      </div>
    </div>
  </div>

  <div class="card transcript-panel">
    <div class="card-header">
      <div class="card-header-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>

    </div>

  <details class="card debug-panel">

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      Debug Log
    </summary>
    <div class="debug-body"><pre class="log-pre" id="log-pre"></pre></div>
  </details>

</div>
</main>
</div>

<script src="https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.min.js"></script>
<script>
"use strict";
(async () => {

const statusEl     = document.getElementById("status");
const statusSub    = document.getElementById("status-sub");
const avatarRing   = document.getElementById("avatar-ring");
const btnCall      = document.getElementById("btn-call");
const txFeed       = document.getElementById("transcript-feed");
const logPre       = document.getElementById("log-pre");
const meterLocal   = document.getElementById("meter-local");
const meterRemote  = document.getElementById("meter-remote");
const pillLK       = document.getElementById("pill-lk");
const pillVLLM     = document.getElementById("pill-vllm");
const pillTTS      = document.getElementById("pill-tts");
const voiceSelect  = document.getElementById("voice-select");
const textInputRow = document.getElementById("text-input-row");
const textInput    = document.getElementById("text-input");

let room = null;
let audioCtx = null, analyserLocal = null, analyserRemote = null, meterInterval = null;
let mockWs = null, mockRecognition = null, _ttsResumeTimer = null;
let _ttsVoicesReady = false;

function log(msg) {
  const ts = new Date().toLocaleTimeString();
  logPre.textContent += `[${ts}] ${msg}\n`;
  logPre.scrollTop = logPre.scrollHeight;
  console.log(msg);
}

function setPillState(pill, state) {
  pill.className = "pill";
  if (state === "ok" || state === "mock") pill.classList.add("green");
  else if (state === "degraded")          pill.classList.add("yellow");
  else                                    pill.classList.add("red");
}

async function checkHealth() {
  try {
    const r = await fetch("/health");
    const d = await r.json();
    setPillState(pillLK,   d.livekit || "red");
    setPillState(pillVLLM, d.vllm    || "red");
    setPillState(pillTTS,  d.tts     || "red");
    log(`Health: lk=${d.livekit} vllm=${d.vllm} tts=${d.tts}`);
  } catch(e) { log("Health check failed: " + e.message); }
}
checkHealth();
setInterval(checkHealth, 30000);

function addMessage(text, speaker) {
  const row = document.createElement("div");
  row.className = `msg-row ${speaker}`;
  if (speaker !== "system") {
    const s = document.createElement("div");
    s.className = "msg-sender";
    s.textContent = speaker === "you" ? "You" : "Sarah";
    row.appendChild(s);
  }
  const b = document.createElement("div");
  b.className = "msg-bubble";
  b.textContent = text;
  row.appendChild(b);
  txFeed.appendChild(row);
  txFeed.scrollTop = txFeed.scrollHeight;
}

function startMeters(localStream, remoteStream) {
  audioCtx = new AudioContext();
  const mk = (stream) => {
    if (!stream) return null;
    const src = audioCtx.createMediaStreamSource(stream);
    const an  = audioCtx.createAnalyser();
    an.fftSize = 512; src.connect(an); return an;
  };
  analyserLocal  = mk(localStream);
  analyserRemote = mk(remoteStream);
  const buf = new Uint8Array(128);
  meterInterval = setInterval(() => {
    const rms = (an) => {
      if (!an) return 0;
      an.getByteTimeDomainData(buf);
      let s = 0;
      for (let i = 0; i < buf.length; i++) { const v = (buf[i]-128)/128; s += v*v; }
      return Math.min(1, Math.sqrt(s/buf.length)*6);
    };
    meterLocal.style.width  = (rms(analyserLocal)  * 100) + "%";
    meterRemote.style.width = (rms(analyserRemote) * 100) + "%";
  }, 80);
}
function stopMeters() {
  if (meterInterval) { clearInterval(meterInterval); meterInterval = null; }
  meterLocal.style.width = meterRemote.style.width = "0%";
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  analyserLocal = analyserRemote = null;
}

btnCall.addEventListener("click", async () => {
  if (mockWs || (room && room.state === "connected")) await hangUp();
  else await startCall();
});

async function startCall() {
  btnCall.disabled = true;
  setStatus("Requesting microphone\u2026");
  let localStream;
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch (e) {
    setStatus("Mic access denied", "error");
    setStatusSub("Please allow microphone access and try again.");
    log("Mic error: " + e.message); btnCall.disabled = false; return;
  }
  setStatus("Connecting to Sarah\u2026");
  log("Fetching token\u2026");
  let tokenData;
  try {
    const r = await fetch("/token");
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    tokenData = await r.json();
  } catch (e) {
    setStatus("Connection failed: " + e.message, "error");
    log("Token error: " + e.message); btnCall.disabled = false; return;
  }
  log(`Room: ${tokenData.room}  LK: ${tokenData.url}  mock=${!!tokenData.mock}`);
  if (tokenData.mock) { await startMockCall(tokenData, localStream); return; }
  const LK = window.LivekitClient;
  room = new LK.Room({ adaptiveStream: false, dynacast: false });
  room.on(LK.RoomEvent.Connected, () => {
    log("Room connected");
    setStatus("Connected \u2014 Room: " + tokenData.room, "connected");
    setStatusSub("Live call in progress"); setCallActive(true);
  });
  room.on(LK.RoomEvent.Disconnected, () => { log("Room disconnected"); onCallEnded(); });
  room.on(LK.RoomEvent.TrackSubscribed, (track, pub, participant) => {
    log(`Track: ${track.kind} from ${participant.identity}`);
    if (track.kind === LK.Track.Kind.Audio) {
      const el = track.attach(); el.style.display = "none"; document.body.appendChild(el);
      addMessage("[ Sarah joined the call ]", "system");
      if (el.srcObject) startMeters(localStream, el.srcObject);
    }
  });
  room.on(LK.RoomEvent.TrackUnsubscribed, (track) => { track.detach(); });
  room.on(LK.RoomEvent.DataReceived, (payload) => {
    try {
      const msg = JSON.parse(new TextDecoder().decode(payload));
      if (msg.type === "transcript") addMessage(msg.text, msg.speaker === "user" ? "you" : "sarah");
    } catch (_) {}
  });
  try { await room.connect(tokenData.url, tokenData.token); }
  catch (e) {
    setStatus("Connection failed: " + e.message, "error");
    log("Connect error: " + e.message); setCallActive(false); btnCall.disabled = false; return;
  }
  try {
    await room.localParticipant.setMicrophoneEnabled(true);
    log("Microphone published"); startMeters(localStream, null);
    addMessage("[ Microphone active ]", "system");
  } catch (e) { log("Publish mic error: " + e.message); }
}

function _startTTSWatchdog() {
  _stopTTSWatchdog();
  _ttsResumeTimer = setInterval(() => {
    if (window.speechSynthesis && window.speechSynthesis.paused) window.speechSynthesis.resume();
  }, 5000);
}
function _stopTTSWatchdog() {
  if (_ttsResumeTimer) { clearInterval(_ttsResumeTimer); _ttsResumeTimer = null; }
}

async function startMockCall(tokenData, localStream) {
  setCallActive(true);
  addMessage("[ Mock mode \u2014 Sarah connected ]", "system");
  startMeters(localStream, null);
  const wsProto = location.protocol === "https:" ? "wss" : "ws";
  const wsUrl = `${wsProto}://${location.host}/mock/ws?room=${encodeURIComponent(tokenData.room)}`;
  log("Mock WS: " + wsUrl);
  mockWs = new WebSocket(wsUrl);
  mockWs.onopen  = () => { setStatus("Connected \u2014 Sarah is live", "connected"); setStatusSub("Mock mode \u00b7 Scripted responses"); log("Mock WS open"); _startTTSWatchdog(); };
  mockWs.onclose = () => { log("Mock WS closed"); _stopTTSWatchdog(); onCallEnded(); };
  mockWs.onerror = () => { log("Mock WS error"); setStatus("Connection error", "error"); };
  mockWs.onmessage = (ev) => {
    try {
      const msg = JSON.parse(ev.data);
      if (msg.type === "transcript") {
        addMessage(msg.text, msg.speaker === "user" ? "you" : "sarah");
        if (msg.speaker !== "user") speakSarah(msg.text);
      }
    } catch(_) {}
  };
  if ("webkitSpeechRecognition" in window || "SpeechRecognition" in window) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    mockRecognition = new SR();
    mockRecognition.continuous = true; mockRecognition.interimResults = false; mockRecognition.lang = "en-US";
    mockRecognition.onresult = (e) => {
      const txt = e.results[e.results.length - 1][0].transcript.trim();
      if (txt && mockWs && mockWs.readyState === WebSocket.OPEN)
        mockWs.send(JSON.stringify({ type: "user_speech", text: txt }));
    };
    mockRecognition.onerror = (e) => log("Speech recognition: " + e.error);
    mockRecognition.start();
    addMessage("[ Microphone active \u2014 speak to Sarah ]", "system");
    log("Web Speech API started");
  } else {
    addMessage("[ Type your reply below and press Enter ]", "system");
    log("SpeechRecognition unavailable \u2014 showing text input");
    textInputRow.style.display = "block"; textInput.focus();
    textInput.onkeydown = (e) => {
      if (e.key === "Enter" && textInput.value.trim() && mockWs && mockWs.readyState === WebSocket.OPEN) {
        mockWs.send(JSON.stringify({ type: "user_speech", text: textInput.value.trim() }));
        textInput.value = "";
      }
    };
  }
}

function _populateVoiceList() {
  if (!("speechSynthesis" in window)) return;
  const voices = window.speechSynthesis.getVoices();
  if (!voices.length) return;
  _ttsVoicesReady = true;
  const engVoices = voices.filter(v => /en[-_]/i.test(v.lang));
  const prev = voiceSelect.value;
  voiceSelect.innerHTML = "";
  engVoices.forEach(v => {
    const opt = document.createElement("option");
    opt.value = v.name;
    opt.textContent = v.name.replace(/Microsoft|Online|Natural/gi, "").trim();
    if (prev ? v.name === prev : /aria/i.test(v.name)) opt.selected = true;
    voiceSelect.appendChild(opt);
  });
  if (!voiceSelect.value && voiceSelect.options.length) voiceSelect.options[0].selected = true;
}
if ("speechSynthesis" in window) {
  _populateVoiceList();
  window.speechSynthesis.onvoiceschanged = _populateVoiceList;
}

function speakSarah(text) {
  if (!("speechSynthesis" in window)) return;
  window.speechSynthesis.cancel();
  const _doSpeak = () => {
    const utt = new SpeechSynthesisUtterance(text);
    utt.rate = 0.95; utt.pitch = 1.0; utt.volume = 1.0;
    const allVoices = window.speechSynthesis.getVoices();
    const sel = voiceSelect && voiceSelect.value;
    const pick =
      (sel && allVoices.find(v => v.name === sel)) ||
      allVoices.find(v => /microsoft.*aria/i.test(v.name))     ||
      allVoices.find(v => /microsoft.*jenny/i.test(v.name))    ||
      allVoices.find(v => /microsoft.*michelle/i.test(v.name)) ||
      allVoices.find(v => /microsoft.*zira/i.test(v.name))     ||
      allVoices.find(v => /en[-_]?(us|gb|au)/i.test(v.lang) && v.name);
    if (pick) utt.voice = pick;
    utt.onerror = (e) => console.warn("TTS error:", e.error);
    window.speechSynthesis.speak(utt);
  };
  if (_ttsVoicesReady || window.speechSynthesis.getVoices().length > 0) setTimeout(_doSpeak, 50);
  else window.speechSynthesis.onvoiceschanged = () => { _populateVoiceList(); setTimeout(_doSpeak, 50); };
}

function setCallActive(active) {
  if (active) {
    btnCall.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Hang Up`;
    btnCall.className = "btn-call active"; btnCall.disabled = false; avatarRing.classList.add("active");
  } else {
    btnCall.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.28 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.6a16 16 0 0 0 6 6l.94-.94a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 21.66 16l.26.92z"/></svg> Call Sarah`;
    btnCall.className = "btn-call idle"; btnCall.disabled = false; avatarRing.classList.remove("active");
  }
}

async function hangUp() {
  btnCall.disabled = true;
  log("Hanging up\u2026");
  _stopTTSWatchdog();
  if ("speechSynthesis" in window) window.speechSynthesis.cancel();
  if (mockWs)  { mockWs.close(); mockWs = null; }
  if (mockRecognition) { try { mockRecognition.stop(); } catch(_){} mockRecognition = null; }
  if (room) { await room.disconnect(); room = null; }
  textInputRow.style.display = "none";
}

function onCallEnded() {
  setStatus("Call ended"); setStatusSub("");
  setCallActive(false); stopMeters();
  addMessage("[ Call ended ]", "system");
}
function setStatus(text, cls) {
  statusEl.textContent = text;
  statusEl.className = "call-status-text" + (cls ? " " + cls : "");
}
function setStatusSub(text) { statusSub.textContent = text; }

})();
</script>
