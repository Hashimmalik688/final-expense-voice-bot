# LiveKit self-hosted server configuration
# Start with: livekit-server --config config/livekit.yaml
# Test:        curl http://localhost:7880

port: 7880
bind_addresses:
  - ""

rtc:
  port_range_start: 50000
  port_range_end: 60000
  use_external_ip: false

keys:
  devkey: secret

logging:
  level: info
  json: false

turn:
  enabled: false
